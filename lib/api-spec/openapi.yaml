openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Academic Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: documents
    description: Document management
  - name: summaries
    description: Document summarization
  - name: concepts
    description: Key concept extraction
  - name: chat
    description: Chat with documents (RAG)
  - name: quiz
    description: Quiz generation
  - name: flashcards
    description: Flashcard generation
  - name: dashboard
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Documents ───────────────────────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents for current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /documents/upload:
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document (PDF, DOCX, TXT)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DocumentUploadInput"
      responses:
        "201":
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{documentId}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a single document
      security:
        - BearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      security:
        - BearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── Summaries ───────────────────────────────────────────────────────────────
  /documents/{documentId}/summarize:
    post:
      operationId: summarizeDocument
      tags: [summaries]
      summary: Generate a summary for a document
      security:
        - BearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummarizeInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Summary"

  /documents/{documentId}/summaries:
    get:
      operationId: getDocumentSummaries
      tags: [summaries]
      summary: Get all summaries for a document
      security:
        - BearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Summary"

  # ─── Concepts ────────────────────────────────────────────────────────────────
  /documents/{documentId}/concepts:
    get:
      operationId: getDocumentConcepts
      tags: [concepts]
      summary: Get extracted key concepts for a document
      security:
        - BearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Concept"

  /documents/{documentId}/extract-concepts:
    post:
      operationId: extractConcepts
      tags: [concepts]
      summary: Extract key concepts from a document
      security:
        - BearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Concept"

  # ─── Chat ─────────────────────────────────────────────────────────────────────
  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List all chat sessions for current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSession"
    post:
      operationId: createChatSession
      tags: [chat]
      summary: Create a new chat session for a document
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatSessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSession"

  /chat/sessions/{sessionId}:
    get:
      operationId: getChatSession
      tags: [chat]
      summary: Get a chat session with its messages
      security:
        - BearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionWithMessages"
    delete:
      operationId: deleteChatSession
      tags: [chat]
      summary: Delete a chat session
      security:
        - BearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /chat/sessions/{sessionId}/messages:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message to a chat session (RAG)
      security:
        - BearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  # ─── Quiz ─────────────────────────────────────────────────────────────────────
  /documents/{documentId}/quiz:
    post:
      operationId: generateQuiz
      tags: [quiz]
      summary: Generate a quiz from a document
      security:
        - BearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quiz:
    get:
      operationId: listQuizzes
      tags: [quiz]
      summary: List all quizzes for current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quiz"

  /quiz/{quizId}:
    get:
      operationId: getQuiz
      tags: [quiz]
      summary: Get a specific quiz
      security:
        - BearerAuth: []
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quiz/{quizId}/submit:
    post:
      operationId: submitQuiz
      tags: [quiz]
      summary: Submit quiz answers
      security:
        - BearerAuth: []
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizSubmission"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  # ─── Flashcards ───────────────────────────────────────────────────────────────
  /documents/{documentId}/flashcards:
    post:
      operationId: generateFlashcards
      tags: [flashcards]
      summary: Generate flashcards from a document
      security:
        - BearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlashcardsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardSet"

  /flashcards:
    get:
      operationId: listFlashcardSets
      tags: [flashcards]
      summary: List all flashcard sets for current user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlashcardSet"

  /flashcards/{setId}:
    get:
      operationId: getFlashcardSet
      tags: [flashcards]
      summary: Get a specific flashcard set
      security:
        - BearerAuth: []
      parameters:
        - name: setId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardSet"

  # ─── Dashboard ────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        detail:
          type: ["string", "null"]
      required:
        - error

    # ─── Auth ──────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    User:
      type: object
      required: [id, email, name, createdAt]
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ─── Documents ─────────────────────────────────────────────────────────────
    DocumentUploadInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary

    Document:
      type: object
      required: [id, userId, name, mimeType, size, status, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        status:
          type: string
          enum: [pending, processing, ready, error]
        pageCount:
          type: ["integer", "null"]
        wordCount:
          type: ["integer", "null"]
        summary:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # ─── Summaries ─────────────────────────────────────────────────────────────
    SummarizeInput:
      type: object
      required: [summaryType]
      properties:
        summaryType:
          type: string
          enum: [short, detailed, bullet, executive]

    Summary:
      type: object
      required: [id, documentId, summaryType, content, createdAt]
      properties:
        id:
          type: string
        documentId:
          type: string
        summaryType:
          type: string
          enum: [short, detailed, bullet, executive]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    # ─── Concepts ──────────────────────────────────────────────────────────────
    Concept:
      type: object
      required: [id, documentId, term, definition, conceptType]
      properties:
        id:
          type: string
        documentId:
          type: string
        term:
          type: string
        definition:
          type: string
        conceptType:
          type: string
          enum: [topic, keyword, definition, formula, date, person]

    # ─── Chat ──────────────────────────────────────────────────────────────────
    ChatSessionInput:
      type: object
      required: [documentId]
      properties:
        documentId:
          type: string
        title:
          type: ["string", "null"]

    ChatSession:
      type: object
      required: [id, documentId, userId, title, messageCount, createdAt]
      properties:
        id:
          type: string
        documentId:
          type: string
        userId:
          type: string
        title:
          type: string
        messageCount:
          type: integer
        documentName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ChatSource:
      type: object
      required: [content, pageNumber, relevanceScore]
      properties:
        content:
          type: string
        pageNumber:
          type: ["integer", "null"]
        relevanceScore:
          type: number

    ChatMessage:
      type: object
      required: [id, sessionId, role, content, createdAt]
      properties:
        id:
          type: string
        sessionId:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/ChatSource"
        createdAt:
          type: string
          format: date-time

    ChatSessionWithMessages:
      type: object
      required: [id, documentId, userId, title, messageCount, createdAt, messages]
      properties:
        id:
          type: string
        documentId:
          type: string
        userId:
          type: string
        title:
          type: string
        messageCount:
          type: integer
        documentName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    # ─── Quiz ──────────────────────────────────────────────────────────────────
    QuizInput:
      type: object
      required: [difficulty, questionCount]
      properties:
        difficulty:
          type: string
          enum: [easy, medium, hard]
        questionCount:
          type: integer
          minimum: 1
          maximum: 20
        questionTypes:
          type: array
          items:
            type: string
            enum: [multiple_choice, true_false, short_answer]

    QuizOption:
      type: object
      required: [label, text]
      properties:
        label:
          type: string
        text:
          type: string

    QuizQuestion:
      type: object
      required: [id, question, questionType, answer]
      properties:
        id:
          type: string
        question:
          type: string
        questionType:
          type: string
          enum: [multiple_choice, true_false, short_answer]
        options:
          type: array
          items:
            $ref: "#/components/schemas/QuizOption"
        answer:
          type: string
        explanation:
          type: ["string", "null"]

    Quiz:
      type: object
      required: [id, documentId, difficulty, questions, createdAt]
      properties:
        id:
          type: string
        documentId:
          type: string
        documentName:
          type: ["string", "null"]
        difficulty:
          type: string
          enum: [easy, medium, hard]
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
        score:
          type: ["integer", "null"]
        maxScore:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    QuizSubmission:
      type: object
      required: [answers]
      properties:
        answers:
          type: object
          additionalProperties:
            type: string

    QuizResult:
      type: object
      required: [quizId, score, maxScore, percentage, feedback]
      properties:
        quizId:
          type: string
        score:
          type: integer
        maxScore:
          type: integer
        percentage:
          type: number
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/QuizFeedbackItem"

    QuizFeedbackItem:
      type: object
      required: [questionId, correct, correctAnswer]
      properties:
        questionId:
          type: string
        correct:
          type: boolean
        yourAnswer:
          type: ["string", "null"]
        correctAnswer:
          type: string
        explanation:
          type: ["string", "null"]

    # ─── Flashcards ────────────────────────────────────────────────────────────
    FlashcardsInput:
      type: object
      required: [cardCount]
      properties:
        cardCount:
          type: integer
          minimum: 1
          maximum: 50
        topic:
          type: ["string", "null"]

    Flashcard:
      type: object
      required: [id, question, answer]
      properties:
        id:
          type: string
        question:
          type: string
        answer:
          type: string

    FlashcardSet:
      type: object
      required: [id, documentId, cards, createdAt]
      properties:
        id:
          type: string
        documentId:
          type: string
        documentName:
          type: ["string", "null"]
        topic:
          type: ["string", "null"]
        cards:
          type: array
          items:
            $ref: "#/components/schemas/Flashcard"
        createdAt:
          type: string
          format: date-time

    # ─── Dashboard ─────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required:
        - totalDocuments
        - totalChats
        - totalQuizzes
        - totalFlashcardSets
        - totalFlashcards
        - documentsReady
        - recentDocuments
      properties:
        totalDocuments:
          type: integer
        totalChats:
          type: integer
        totalQuizzes:
          type: integer
        totalFlashcardSets:
          type: integer
        totalFlashcards:
          type: integer
        documentsReady:
          type: integer
        averageQuizScore:
          type: ["number", "null"]
        recentDocuments:
          type: array
          items:
            $ref: "#/components/schemas/Document"

    ActivityItem:
      type: object
      required: [id, activityType, title, createdAt]
      properties:
        id:
          type: string
        activityType:
          type: string
          enum: [upload, chat, quiz, flashcard, summary]
        title:
          type: string
        description:
          type: ["string", "null"]
        documentId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
