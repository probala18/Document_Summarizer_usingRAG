kind = "web"
previewPath = "/"
title = "AI Academic Assistant"
version = "1.0.0"
id = "artifacts/academic-assistant"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24618

[services.development]
run = "pnpm --filter @workspace/academic-assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/academic-assistant", "run", "build" ]
serve = "static"
publicDir = "artifacts/academic-assistant/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24618"
BASE_PATH = "/"
